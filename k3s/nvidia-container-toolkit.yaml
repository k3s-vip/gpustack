---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-container-toolkit
  namespace: default
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-container-toolkit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-container-toolkit
    spec:
      containers:
        - command:
            - sh
            - -ec
            - deviceQuery && exec sleep inf
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
          image: muicoder/containers:v1.19.0
          name: nvidia-cuda-sample
      enableServiceLinks: false
      hostNetwork: true
      hostPID: true
      initContainers:
        - command:
            - sh
            - -ec
            - echo $BASE64 | base64 -d | sh || exec sleep inf
          env:
            - name: BASE64
              value: 
          image: muicoder/containers:v1.19.0
          name: nvidia-container-toolkit
          securityContext:
            privileged: true
            seLinuxOptions:
              level: s0
          volumeMounts:
            - mountPath: /host
              name: host
      nodeSelector:
        kubernetes.io/os: linux
      #runtimeClassName: nvidia
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      volumes:
        - hostPath:
            path: /
            type: Directory
          name: host
